version: '3.8'

services:
  poseidon:
    build: .
    ports:
      - "3100:3100"
    volumes:
      - poseidon_data:/app/backend/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-poseidon-dev-secret-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/api/health',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(d.includes('operational')?0:1))}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  poseidon_data:
